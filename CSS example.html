<!DOCTYPE html>
<html>
<head>
    <title>Styled Profile Card</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;

        }

        .card {
            background-color: #ffffff;
            width: 350px;
            padding: 30px;
            border-radius: 15px;
            box-shadow:2px 2px 5px gray;
            text-align: center;
            border-top: 8px solid #007bff;
        }

        .profile-img {
            width:100%;
            height:100%;
        }

        h1 {
            font-size: 24px;
            color: #333333
        }

        h2 {
            font-size: 14px;
            color: #5086c0;
        
        }

        p {
            font-size: 15px;
            color: #666666;
            line-height: 1.6;
            margin-bottom: 25px;
        }
    </style>
</head>
<body>

    <div class="photo">
            <img src="Pimage.jpeg" alt="Student Photo">
        </div>
    </div>
        <h1>Jikra Mangure</h1>
        <h2>Web Development Student</h2>
        <p> Hello! My name is Jikra Mangure. I am a student of BCA 2 year who is learning HTML,
            web development, and new technologies. I enjoy creating websites
            and improving my programming skills.
        </p>
    
    
    </div>

</body>
</html>
