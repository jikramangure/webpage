<!DOCTYPE html>
<html>

</head>
<body>

    <table border="1">

            <th>Marks</th>
        </tr>
        <tr>
            <td>101</td>
            <td>Ali</td>
            <td>76</td>
        </tr>
        <tr>
            <td>102</td>
            <td>Sara</td>
            <td>80</td>
        </tr>
        <tr>
            <td>103</td>
            <td>Ahmed</td>
            <td>77</td>
        </tr>
        <tr>
            <td colspan="2" class="total">Total Students</td>
            <td>3</td>
        </tr>
    </table>

</body>
</html>
