<!DOCTYPE html>
<html>
<head>
    <title>Website Card with Image</title>
    <style>
        .box {
            width: 300px;
            background-color:linear-gradient(135deg,#3d0d37,#b7268e);
            color: rgb(67, 63, 63);
            padding: 20px;
            margin: 20px auto;
            border: 2px solid rgb(216, 151, 216);
            border-radius: 10px;
            box-shadow: 2px 2px 5px gray;
            text-align: center;
        }

        .box img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 2px solid rgb(152, 59, 138);
        }

        button {
            background-color: rgb(160, 62, 153);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="box">
        <img src="Pimage.jpeg" alt="Student Photo">

        <h2>Student Profile</h2>

        <p><b>Name:</b> Jikra Mangure</p>
        <p><b>Course:</b> BCA</p>

        <button>View More</button>
    </div>

</body>
</html>
