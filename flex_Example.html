<!DOCTYPE html>
<html>
<head>
    <title>Flex Example</title>
    <style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}
body{
    background:#f5f5f5;
    padding:30px;
}

.container{
    display: flex;
    flex-wrap: wrap;
    gap: 15px;
}

.card{
    flex: 1 1 calc(50% - 15px);
    height: 150px;
    border: 1px solid black;
    background-color: plum;

    display: flex;
    justify-content: center;
    align-items: center;
    box-sizing: border-box;
}

.card img{
    width: 250px;
    height: 300px;
    object-fit: cover;
    justify-content: center;
    
}
</style>

</head>
<body>

    <div class="container">
        <div class="item">
            <img src="flower1.jpg" alt="Flower">
        </div>
        <div class="item">
            <img src="flower2.jpg" alt="Flower">
        </div>
        <div class="item">
            <img src="flower3.jpg" alt="Flower">
        </div>
        <div class="item">
            <img src="flower4.avif" alt="Flower">
        </div>
    </div>

</body>
</html>
