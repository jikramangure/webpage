<!DOCTYPE html>
<html>
<head>
    <title>flex Example</title>
    <style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

.body{
    background:#f5f5f5;
    padding:30px;
}

.container{
    display: flex;
    flex-direction: row;
    justify-content: center;
    gap: 15px;            
    width: 100%;
    padding: 10px;
    
}


.card{
    width: 80%;
    height: 80%;
    background-color: #fff;
}

.card img{
    width: 100%;
    height: 50%; 
    
}

</style>


</head>
<body>

<div class="container">

    <div class="card L1">
        <img src="python logo.webp" alt="Python">
       
    </div>

    <div class="card L2">
        <img src="Java logo.jpg" alt="java">
        
    </div> 

    <div class="card L3">
        <img src="css logo.jpg" alt="css">
        

    <div class="card L4">
        <img src="cpp logo.webp" alt="cpp">
        
     
</div>

</body>
</html>
