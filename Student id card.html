<!DOCTYPE html>
<html>
<head>
<title>Student ID Card</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    
}

body{
    background:#eef3f8;
}

.id-card{
    width:750px;
    height:420px;
    margin:40px auto;
    display:flex;
    border-radius:25px;
    overflow:hidden;
    box-shadow:0 10px 25px rgba(0,0,0,0.25);
    background:rgb(247, 244, 244);
}

/* Left Section */
.left{
    width:35%;
    background:linear-gradient(135deg,#3d0d37,#b7268e);
    color:white;
    text-align:center;
    padding:25px;
}

.left h2{
    margin-bottom:20px;
}

.photo{
    width:160px;
    height:160px;
    border-radius:50%;
    border:5px solid white;
    margin:20px auto;
    overflow:hidden;
}

.photo img{
    width:100%;
    height:100%;
}

.left h3{
    margin-top:15px;
}

.left p{
    font-size:14px;
    margin-top:8px;
}

/* Right Section */
.right{
    width:65%;
    padding:30px;
}

.right h1{
    color:#1d1e20;
    text-align:center;
    margin-bottom:25px;
    border-bottom:3px solid #a32f88;
    padding-bottom:10px;
}

.info{
    margin-top:15px;
}

.info p{
    font-size:20px;
    margin:18px 0;
}

.info span{
    font-weight:bold;
    color:#18181a;
}

.footer{
    margin-top:25px;
    background:#982b79;
    color:white(62, 60, 60);
    text-align:center;
    padding:12px;
    border-radius:10px;
    font-weight:bold;
}
</style>

</head>
<body>

<div class="id-card">

    <div class="left">
        <h2>Smt.Mathubai Garware Kanya College</h2>

        <div class="photo">
            <img src="Pimage.jpeg" alt="Student Photo">
        </div>

        <h3>STUDENT</h3>
        <p>Academic Year 2025-26</p>
    </div>

    <div class="right">

        <h1>IDENTITY CARD</h1>

        <div class="info">
            <p><span>Name :</span> Jikra Mangure</p>
            <p><span>Roll No :</span> 101</p>
            <p><span>Course :</span> Web Development</p>
            <p><span>College :</span> Smt.Mathubai Garware Kanya College</p>
            <p><span>Blood Group :</span> A+</p>
            <p><span>Contact :</span> 9876543210</p>
        </div>

        <div class="footer">
            Valid Student Identity Card
        </div>

    </div>

</div>

</body>
</html>
