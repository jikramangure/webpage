<!DOCTYPE html>
<html>
<head>
    <title>Switch Statement Example</title>
</head>
<body>

    <h2>JavaScript Switch Statement</h2>
<script>
        let grade =prompt("Enter grade (A,B or C):");
switch(grade) 
{
    case "A":
        document.write("Excellent");
        break;

    case "B":
        document.write("Good");
        break;

    case "C":
        document.write("Average");
        break;

    default:
        document.write("Invalid Grade");
}
</script>

</body>
</html>
