<!DOCTYPE html>
<html>
<head>
    <title>Switch Statement Example</title>
</head>
<body>

    <h2>JavaScript Switch Statement</h2>

    <script>
        let ch = prompt("Enter a :");
 
        switch (ch) {
            case "a":
                document.write(ch + " is a vowel");
                break;

            case "e":
                document.write(ch + " is a vowel");
                break;

             case "i":
                document.write(ch + " is a vowel");
                break; 
                
             case "o":
                document.write(ch + " is a vowel");
                break; 
            
             case "u":
                document.write(ch + " is a vowel");
                break;    

            default:
                document.write(ch + " is a consonant");
        }
    </script>

</body>
</html>
