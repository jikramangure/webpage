<!DOCTYPE html>
<html>
<head>
    <title>Multimedia Tags Example</title>
</head>
<body>
    

    <h2>Image</h2>
    <img src="images.jfif" alt="Flower" width="200">

    <h2>Audio</h2>
    <audio controls>
        <source src="Goblin OST.mp3" type="audio/mpeg">
    </audio>

    <h2>Video</h2>
    <video width="400" controls>
        <source src="Muzan entry.mp4" type="video/mp4">
    </video>

    <h2>YouTube Video</h2>
    <iframe
        width="560" 
        height="315" 
        src="https://www.youtube.com/embed/gVdOAo_cnWs?si=MpUUXnM3cF5asMlX" >
    </iframe>

</body>
</html>
