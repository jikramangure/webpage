<!DOCTYPE html>
<html>
<head>
    <title>Creative Product Cards</title>
    <link rel="stylesheet" href="spyder.css">
</head>
<body>

<section class="product-container">

    <!-- Card 1 -->
    <article class="card laptop-card">
        <header>
            <span class="badge">HOT</span>
        </header>
        <figure>
            <img src="laptop.png" alt="Gaming Laptop">
            <figcaption>Gaming Laptop</figcaption>
        </figure>
        <footer>
            <button>Explore</button>
        </footer>
    </article>

    <!-- Card 2 -->
    <article class="card gimbal-card">
        <header>
            <h3>Smart Gimbal</h3>
        </header>
        <figure>
            <img src="gimbal.png" alt="Gimbal">
        </figure>
        <footer>
            <a href="#">View Details</a>
        </footer>
    </article>

    <!-- Card 3 -->
    <article class="card earbuds-card">
        <figure>
            <img src="earbuds.png" alt="Earbuds">
            <figcaption>True Wireless</figcaption>
        </figure>
        <footer>
            <span>Premium Sound</span>
        </footer>
    </article>

    <!-- Card 4 -->
    <article class="card pack-card">
        <header>
            <h4>Medical Kit</h4>
        </header>
        <figure>
            <img src="pack.png" alt="Hot and Cold Pack">
        </figure>
        <footer>
            <button>Buy Now</button>
        </footer>
    </article>

</section>

</body>
</html>
